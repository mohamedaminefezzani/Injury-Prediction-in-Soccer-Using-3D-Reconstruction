<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SAM 3D Body — Soccer Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0c0f;
    --surface:  #111318;
    --border:   #1e2229;
    --accent:   #00e5a0;
    --accent2:  #0af;
    --warn:     #f90;
    --danger:   #f44;
    --text:     #d0d6e0;
    --muted:    #505868;
    --font-ui:  'Barlow Condensed', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--text); font-weight: 300; }
  .badge {
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--accent);
    color: #000;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
  }

  /* ── Layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }

  /* ── Left panel ── */
  .panel-left {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .section {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Drop zone ── */
  .dropzone {
    border: 1px dashed var(--border);
    border-radius: 4px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .dropzone:hover, .dropzone.drag { border-color: var(--accent); background: rgba(0,229,160,.04); }
  .dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .dropzone-icon { font-size: 28px; margin-bottom: 8px; }
  .dropzone-label { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .dropzone-label strong { color: var(--accent); }
  #file-name { font-family: var(--font-mono); font-size: 11px; color: var(--accent2); margin-top: 8px; word-break: break-all; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 10px 20px;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    width: 100%;
    justify-content: center;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn-primary   { background: var(--accent);  color: #000; }
  .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn + .btn    { margin-top: 10px; }

  /* ── Player selector ── */
  #player-section { display: none; }
  .player-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .player-chip {
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .player-chip:hover  { border-color: var(--accent); color: var(--accent); }
  .player-chip.active { border-color: var(--accent); background: var(--accent); color: #000; font-weight: 600; }

  /* ── Status log ── */
  .log {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    padding: 12px 0 0;
    min-height: 40px;
  }
  .log .ok   { color: var(--accent); }
  .log .warn { color: var(--warn); }
  .log .err  { color: var(--danger); }

  /* ── Progress ── */
  .progress-wrap { display: none; margin-top: 12px; }
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width .3s;
    animation: pulse-bar 1.5s ease-in-out infinite;
  }
  @keyframes pulse-bar {
    0%,100% { opacity: 1; } 50% { opacity: .5; }
  }

  /* ── Right panel ── */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .view-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
  }
  .tab {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 18px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .view-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(0,229,160,.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,170,255,.03) 0%, transparent 60%),
      var(--bg);
  }

  .placeholder {
    text-align: center;
    color: var(--muted);
  }
  .placeholder-icon { font-size: 48px; margin-bottom: 16px; opacity: .3; }
  .placeholder-text { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

  #preview-img, #result-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: none;
    border-radius: 2px;
  }

  /* ── Download bar ── */
  #download-bar {
    display: none;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  #download-bar .dl-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  #download-bar .dl-name {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent2);
    flex: 1;
  }
  .btn-dl {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SAM 3D<span> Body</span></div>
  <div class="badge">SOCCER ANALYSIS</div>
</header>

<main>
  <!-- ── Left panel ── -->
  <div class="panel-left">

    <div class="section">
      <div class="section-title">Upload Video</div>
      <div class="dropzone" id="dropzone">
        <input type="file" id="video-input" accept="video/*"/>
        <div class="dropzone-icon">🎬</div>
        <div class="dropzone-label">Drop a video or <strong>click to browse</strong></div>
        <div id="file-name"></div>
      </div>
      <div class="log" id="upload-log"></div>
      <button class="btn btn-primary" id="preview-btn" style="margin-top:14px" disabled>
        Detect Players
      </button>
    </div>

    <div class="section" id="player-section">
      <div class="section-title">Select Player</div>
      <div class="player-grid" id="player-grid"></div>
      <button class="btn btn-primary" id="track-btn" disabled>
        Track &amp; Reconstruct
      </button>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="log" id="track-log"></div>
    </div>

  </div>

  <!-- ── Right panel ── -->
  <div class="panel-right">
    <div class="view-tabs">
      <div class="tab active" data-tab="preview">Frame Preview</div>
      <div class="tab" data-tab="result">Result</div>
    </div>

    <div class="view-content" id="view-content">
      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">⚽</div>
        <div class="placeholder-text">Upload a video to begin</div>
      </div>
      <img id="preview-img" alt="Frame preview"/>
      <img id="result-img" alt="Result"/>
    </div>

    <div id="download-bar">
      <span class="dl-label">Output</span>
      <span class="dl-name" id="dl-name">—</span>
      <a class="btn-dl" id="dl-link" href="#" download>⬇ Download</a>
    </div>
  </div>
</main>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let videoId      = null;
  let selectedPlayer = null;
  let activeTab    = 'preview';
  let jobPoll      = null;

  // ── Elements ─────────────────────────────────────────────────────────────
  const videoInput   = document.getElementById('video-input');
  const fileNameEl   = document.getElementById('file-name');
  const uploadLog    = document.getElementById('upload-log');
  const previewBtn   = document.getElementById('preview-btn');
  const playerSection= document.getElementById('player-section');
  const playerGrid   = document.getElementById('player-grid');
  const trackBtn     = document.getElementById('track-btn');
  const progressWrap = document.getElementById('progress-wrap');
  const trackLog     = document.getElementById('track-log');
  const previewImg   = document.getElementById('preview-img');
  const resultImg    = document.getElementById('result-img');
  const placeholder  = document.getElementById('placeholder');
  const downloadBar  = document.getElementById('download-bar');
  const dlName       = document.getElementById('dl-name');
  const dlLink       = document.getElementById('dl-link');

  // ── Helpers ───────────────────────────────────────────────────────────────
  function log(el, msg, cls='') {
    el.innerHTML = `<span class="${cls}">${msg}</span>`;
  }

  function showView(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t =>
      t.classList.toggle('active', t.dataset.tab === tab)
    );
    placeholder.style.display = 'none';
    previewImg.style.display  = tab === 'preview' && previewImg.src ? 'block' : 'none';
    resultImg.style.display   = tab === 'result'  && resultImg.src  ? 'block' : 'none';
    if (!previewImg.src && !resultImg.src) placeholder.style.display = 'block';
  }

  document.querySelectorAll('.tab').forEach(t =>
    t.addEventListener('click', () => showView(t.dataset.tab))
  );

  // ── Drag & drop ──────────────────────────────────────────────────────────
  const dropzone = document.getElementById('dropzone');
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag');
    if (e.dataTransfer.files[0]) onFileSelected(e.dataTransfer.files[0]);
  });

  videoInput.addEventListener('change', () => {
    if (videoInput.files[0]) onFileSelected(videoInput.files[0]);
  });

  function onFileSelected(file) {
    fileNameEl.textContent = file.name;
    previewBtn.disabled = false;
    log(uploadLog, `Ready: ${file.name}`, 'ok');
    // Reset state
    playerSection.style.display = 'none';
    downloadBar.style.display   = 'none';
    previewImg.src = '';
    resultImg.src  = '';
    videoId = null;
    selectedPlayer = null;
  }

  // ── Step 1: Preview ───────────────────────────────────────────────────────
  previewBtn.addEventListener('click', async () => {
    const file = videoInput.files[0];
    if (!file) return;

    previewBtn.disabled = true;
    log(uploadLog, 'Uploading & detecting…', 'warn');

    const fd = new FormData();
    fd.append('video', file);

    try {
      const res  = await fetch('/preview', { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok) throw new Error(data.detail || 'Preview failed');

      videoId = data.video_id;

      // Show annotated preview
      previewImg.src = data.preview_url + '?t=' + Date.now();
      previewImg.style.display = 'block';
      placeholder.style.display = 'none';
      showView('preview');

      log(uploadLog, `✓ ${data.n_players} player(s) detected`, 'ok');

      // Build player chips
      playerGrid.innerHTML = '';
      for (let i = 0; i < data.n_players; i++) {
        const chip = document.createElement('button');
        chip.className = 'player-chip';
        chip.textContent = `#${i}`;
        chip.dataset.idx = i;
        chip.addEventListener('click', () => selectPlayer(i, chip));
        playerGrid.appendChild(chip);
      }

      playerSection.style.display = 'block';
      trackBtn.disabled = true;
      previewBtn.disabled = false;

    } catch(e) {
      log(uploadLog, `Error: ${e.message}`, 'err');
      previewBtn.disabled = false;
    }
  });

  function selectPlayer(idx, chipEl) {
    selectedPlayer = idx;
    document.querySelectorAll('.player-chip').forEach(c => c.classList.remove('active'));
    chipEl.classList.add('active');
    trackBtn.disabled = false;
    log(trackLog, `Player #${idx} selected`, 'ok');
  }

  // ── Step 2: Track ─────────────────────────────────────────────────────────
  trackBtn.addEventListener('click', async () => {
    if (selectedPlayer === null || !videoId) return;

    trackBtn.disabled = true;
    progressWrap.style.display = 'block';
    document.getElementById('progress-fill').style.width = '0%';
    log(trackLog, 'Starting tracking job…', 'warn');
    downloadBar.style.display = 'none';

    try {
      const res  = await fetch(`/track?video_id=${videoId}&player_idx=${selectedPlayer}`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Track failed');

      pollJob(data.job_id);

    } catch(e) {
      log(trackLog, `Error: ${e.message}`, 'err');
      trackBtn.disabled = false;
      progressWrap.style.display = 'none';
    }
  });

  function pollJob(jobId) {
    let dots = 0;
    let pct  = 5;
    if (jobPoll) clearInterval(jobPoll);

    jobPoll = setInterval(async () => {
      dots = (dots + 1) % 4;
      pct  = Math.min(pct + 2, 90);
      document.getElementById('progress-fill').style.width = pct + '%';
      log(trackLog, 'Processing' + '.'.repeat(dots + 1), 'warn');

      const res  = await fetch(`/job/${jobId}`);
      const data = await res.json();

      if (data.status === 'done') {
        clearInterval(jobPoll);
        document.getElementById('progress-fill').style.width = '100%';
        log(trackLog, '✓ Done!', 'ok');
        trackBtn.disabled = false;

        // Show result
        const filename = data.result.split('/').pop();
        resultImg.src  = data.result + '?t=' + Date.now();
        resultImg.style.display = 'none'; // it's a video, use download
        showView('result');

        // Download bar
        dlName.textContent  = filename;
        dlLink.href         = `/download/${filename}`;
        dlLink.download     = filename;
        downloadBar.style.display = 'flex';

        setTimeout(() => { progressWrap.style.display = 'none'; }, 1000);

      } else if (data.status === 'error') {
        clearInterval(jobPoll);
        log(trackLog, `Error: ${data.error}`, 'err');
        trackBtn.disabled = false;
        progressWrap.style.display = 'none';
      }
    }, 2000);
  }
</script>
</body>
</html>
